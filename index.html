<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>BTM — Bethesna Task Management</title>

    <!-- Viewport: Mobile responsive (width=device-width), Desktop-Layout greift ab 1024px im CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />

    <!-- Primary Meta -->
    <meta name="description" content="BTM ist das interne Task-, Zeit- und Kapazitäts-Management für Bethesna. Wochenplanung, Live-Timer mit Pomodoro, Team-Kapazität und KI-gestützte Aufgaben-Extraktion." />
    <meta name="keywords" content="Task Management, Zeiterfassung, Pomodoro, Kanban, Wochenplanung, Bethesna, BTM, Projektmanagement" />
    <meta name="author" content="Bethesna" />
    <meta name="application-name" content="BTM" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Robots: internes Tool, nicht indexieren -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />

    <!-- Open Graph (für Slack/Mail-Previews intern) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BTM — Bethesna Task Management" />
    <meta property="og:description" content="Internes Task-, Zeit- und Kapazitäts-Management für Bethesna." />
    <meta property="og:url" content="https://btm.bethesna.org/" />
    <meta property="og:image" content="https://btm.bethesna.org/app-icon-512.png" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:site_name" content="BTM" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BTM — Bethesna Task Management" />
    <meta name="twitter:description" content="Internes Task-, Zeit- und Kapazitäts-Management für Bethesna." />
    <meta name="twitter:image" content="https://btm.bethesna.org/app-icon-512.png" />

    <!-- Favicons -->
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="alternate icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="mask-icon" href="/app-icon.svg" color="#1C1A17" />

    <!-- iOS Home-Screen / PWA -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BTM" />

    <!-- Theme: passt zur Brand-Mark; light/dark werden via prefers-color-scheme + JS gesetzt -->
    <meta name="theme-color" content="#1C1A17" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)" />

    <!-- Sicherheit: kein Cross-Origin-Embed in fremden Sites -->
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />

    <!-- Canonical -->
    <link rel="canonical" href="https://btm.bethesna.org/" />

    <style>
      body {
        font-family: var(--font-body);
        color: var(--ink-900);
        background: var(--bg-page);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
