<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>BTM — %VITE_APP_FULL_NAME%</title>

    <!-- Viewport: Mobile responsive. maximum-scale=1 + user-scalable=no verhindert
         dass iOS bei Input-Focus reinzoomt (passiert sonst bei font-size < 16px).
         viewport-fit=cover lässt env(safe-area-inset-*) auf iPhones funktionieren. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta -->
    <meta name="description" content="BTM — team task, time and capacity management. Weekly planning, live timer, Pomodoro, AI task extraction." />
    <meta name="keywords" content="Task Management, Time Tracking, Pomodoro, Kanban, Weekly Planning, BTM, Project Management" />
    <meta name="author" content="Bemany" />
    <meta name="application-name" content="BTM" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Robots: internes Tool, nicht indexieren -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />

    <!-- Open Graph (für Slack/Mail-Previews intern) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BTM — %VITE_APP_FULL_NAME%" />
    <meta property="og:description" content="Team task, time and capacity management. Weekly planning, live timer, Pomodoro, AI task extraction." />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:site_name" content="BTM" />

    <!-- Favicons -->
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="alternate icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="mask-icon" href="/app-icon.svg" color="#1C1A17" />

    <!-- iOS Home-Screen / PWA -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BTM" />

    <!-- Theme: passt zur Brand-Mark; light/dark werden via prefers-color-scheme + JS gesetzt -->
    <meta name="theme-color" content="#1C1A17" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)" />

    <style>
      body {
        font-family: var(--font-body);
        color: var(--ink-900);
        background: var(--bg-page);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
