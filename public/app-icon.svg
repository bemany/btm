<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="BTM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C1A17" />
      <stop offset="1" stop-color="#2A2622" />
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)" />
  <rect x="6" y="6" width="500" height="500" rx="106" stroke="url(#stroke)" stroke-opacity="0.18" stroke-width="2" />

  <!-- Drei Time-Tracks (Kanban-Lanes) -->
  <rect x="96" y="144" width="320" height="32" rx="16" fill="#ffffff" fill-opacity="0.18" />
  <rect x="96" y="240" width="320" height="32" rx="16" fill="#ffffff" fill-opacity="0.18" />
  <rect x="96" y="336" width="320" height="32" rx="16" fill="#ffffff" fill-opacity="0.18" />

  <!-- Erledigt-Anteile (filled segments) -->
  <rect x="96" y="144" width="144" height="32" rx="16" fill="#ffffff" fill-opacity="0.55" />
  <rect x="96" y="240" width="224" height="32" rx="16" fill="#ffffff" fill-opacity="0.55" />
  <rect x="96" y="336" width="96"  height="32" rx="16" fill="#ffffff" fill-opacity="0.55" />

  <!-- Live-Capsule auf mittlerer Lane -->
  <rect x="320" y="224" width="64" height="64" rx="32" fill="#C85A2C" />
</svg>
